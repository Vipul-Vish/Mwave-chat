


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mwave - Login</title>
    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --bg-body: #050A10; /* Logo background color */
            --accent-color: #075E54; /* Mwave/WhatsApp Teal */
            --text-main: #E9EDEF;
            --bg-card: rgba(17, 27, 33, 0.9); /* Transparent dark card */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            
            /* --- FULL SCREEN LOGO BACKGROUND --- */
            background-color: var(--bg-body);
            background-image: url("/static/mwave_logo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Overlay to make text readable */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            z-index: -1;
        }

        .form-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            width: 320px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); /* Glassmorphism effect */
        }

        .login-logo {
            width: 80px;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: 1px solid #2A3942;
            border-radius: 8px;
            box-sizing: border-box;
            background: #2A3942;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover {
            background: #0a7c6e;
            transform: translateY(-2px);
        }

        a {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
            text-decoration: none;
            color: #8696A0;
            transition: 0.3s;
        }

        a:hover {
            color: var(--accent-color);
        }

        /* Flash Messages styling */
        .flash {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4b4b;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.85em;
            border: 1px solid #ff4b4b;
        }
    </style>
</head>
<body>
    <div class="form-box">
        <img src="/static/mwave_logo.png" alt="Mwave" class="login-logo">
        
        <h2>Login to Mwave</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input name="username" placeholder="Username" required autocomplete="off">
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        
        <a href="/register">Don't have an account? Create one</a>
    </div>
</body>
</html>
