

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mwave - Dashboard</title>
    <style>
       
        :root {
            --bg-body: #050A10; 
            --bg-header: #075E54; 
            --text-header: #FFFFFF;
            --bg-card: rgba(17, 27, 33, 0.95); 
            --text-main: #E9EDEF;
            --text-muted: #8696A0;
            --accent-color: #25D366; 
            --border-color: #202C33;
            --hover-color: #202C33;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            
        
            background-color: var(--bg-body);
            background-image: url("/static/mwave_logo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: -1;
        }

        .main-card {
            background-color: var(--bg-card);
            width: 90%;
            max-width: 450px;
            height: 80vh;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px); 
        }

        .header {
            background-color: var(--bg-header);
            padding: 15px 20px;
            color: var(--text-header);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
        }

        .header-logo {
            height: 35px;
            width: auto;
            margin-right: 12px;
            border-radius: 5px;
        }

        .header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        .logout-btn {
            color: white;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 5px 12px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        #notif-bar {
            background-color: var(--accent-color);
            color: black;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
            cursor: pointer;
            font-weight: bold;
        }

        .user-container {
            flex: 1;
            overflow-y: auto;
            padding: 5px 0;
        }

        .user-container::-webkit-scrollbar {
            width: 5px;
        }
        .user-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
        }

        .user-row {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border-color);
            transition: 0.2s;
        }

        .user-row:hover {
            background-color: var(--hover-color);
        }

        .avatar {
            width: 50px;
            height: 50px;
            background-color: #68717a;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: white;
            margin-right: 15px;
            font-weight: bold;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            margin: 0;
            font-size: 16px;
            font-weight: 500;
        }

        .status {
            margin: 3px 0 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        .empty {
            padding: 50px 20px;
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="header">
            <div class="logo-section">
                <img src="/static/mwave_logo.png" alt="M" class="header-logo">
                <h2>Mwave Chats</h2>
            </div>
            <a href="{{ url_for('routes.logout') }}" class="logout-btn">Logout</a>
        </div>

        <div id="notif-bar" onclick="location.reload()"></div>

        <div class="user-container">
            {% if users %}
                {% for user in users %}
                <a href="{{ url_for('routes.chat', partner_name=user.username) }}" class="user-row">
                    <div class="avatar">{{ user.username[0] | upper }}</div>
                    <div class="user-info">
                        <p class="user-name">{{ user.username }}</p>
                        <p class="status">Tap to chat</p>
                    </div>
                </a>
                {% endfor %}
            {% else %}
                <div class="empty">
                    <p>No users found online.</p>
                </div>
            {% endif %}
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
    <script>
        const socket = io();
        
        socket.on('connect', () => {
            socket.emit("join", { username: "{{ current_user.username }}", partner: "global" });
        });

        socket.on('new_notification', (data) => {
            const bar = document.getElementById('notif-bar');
            bar.style.display = "block";
            bar.innerHTML = `📩 New Message from ${data.sender}`;
            
            setTimeout(() => { bar.style.display = "none"; }, 5000);
        });
    </script>
</body>
</html>
